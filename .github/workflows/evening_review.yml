name: AlphaShark Evening Review

on:
  schedule:
    # 20:30 UTC = 23:30 EEST (UTC+3, summer / game period) — 30 min after US close (20:00 UTC)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub mobile app

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    concurrency:
      group: alphashark-git-push
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run evening review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          ARIPAEV_COOKIE: ${{ secrets.ARIPAEV_COOKIE }}
        run: python scripts/evening_review.py

      - name: Commit evening observations
        if: success()
        run: |
          git config user.name "AlphaShark Bot"
          git config user.email "alphashark@noreply"
          for i in {1..3}; do
            git pull --rebase --autostash origin main && break
            echo "git pull --rebase failed, retrying in 15s..."
            [ "$i" -lt 3 ] && sleep 15 || { echo "git pull --rebase failed after 3 attempts"; exit 1; }
          done
          git add evening_observations.json || true
          git diff --staged --quiet || git commit -m "chore: evening observations $(date +%Y-%m-%d)"
          for i in {1..3}; do
            git push && break
            echo "git push failed, retrying in 30s..."
            [ "$i" -lt 3 ] && sleep 30 || { echo "git push failed after 3 attempts"; exit 1; }
          done
