name: AlphaShark Evening Review

on:
  schedule:
    # 20:30 UTC = 23:30 EEST (UTC+3, summer / game period) — 30 min after US close (20:00 UTC)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub mobile app

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: alphashark-git-push
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evening review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          ARIPAEV_COOKIE: ${{ secrets.ARIPAEV_COOKIE }}
        run: python scripts/evening_review.py

      - name: Commit evening observations
        run: |
          git config user.name "AlphaShark Bot"
          git config user.email "alphashark@noreply"
          git pull --rebase --autostash origin main
          git add evening_observations.json || true
          git diff --staged --quiet || git commit -m "chore: evening observations $(date +%Y-%m-%d)"
          git push
