# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: AlphaShark Daily Run

on:
  # Schedule removed 2026-05-11: GitHub cron delays 2-3.5h consistently, causing missed cutoffs.
  # Trigger now via cron-job.org -> workflow_dispatch at 08:00 CEST (06:00 UTC) Mon-Fri.
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: alphashark-daily
      cancel-in-progress: true
    permissions:
      contents: write   # needed to commit portfolio_history.json + DAILY_LOG.md back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AlphaShark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: python main.py

      - name: Alert on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"🚨 AlphaShark FAILED","description":"Morning run failed — portfolio was NOT updated.\n\n**Action required:** Submit portfolio manually on the game website before **10:00 EET**.","color":15158332}]}'

      - name: Commit portfolio history and daily log
        if: success()
        run: |
          git config user.name "AlphaShark Bot"
          git config user.email "alphashark@noreply"
          FILES="portfolio_history.json DAILY_LOG.md PREGAME_LOG.md PREGAME_LEARNING.md AI_SELF_CRITIQUE.md live_mode_lock.json"
          for f in $FILES; do
            if [ -e "$f" ]; then
              git add "$f"
            else
              echo "Skipping missing file: $f"
            fi
          done
          TODAY=$(date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "chore: daily portfolio update $TODAY"
          git status --short && git restore . 2>/dev/null || true
          for i in {1..3}; do
            git pull --rebase origin main && break
            echo "git pull --rebase failed, retrying in 15s..."
            [ "$i" -lt 3 ] && sleep 15 || { echo "git pull --rebase failed after 3 attempts"; exit 1; }
          done
          for i in {1..3}; do
            git push && break
            echo "git push failed, retrying in 30s..."
            [ "$i" -lt 3 ] && sleep 30 || { echo "git push failed after 3 attempts"; exit 1; }
          done
