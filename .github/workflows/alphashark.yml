name: AlphaShark Daily Run

on:
  schedule:
    # 06:30 UTC = 09:30 EEST (UTC+3, summer / game period)
    # Runs Mon–Fri, 90 min before the 10:00 EET submission cutoff
    - cron: '30 6 * * 1-5'
  workflow_dispatch:   # allow manual trigger for testing

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit portfolio_history.json + DAILY_LOG.md back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AlphaShark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit portfolio history and daily log
        run: |
          git config user.name "AlphaShark Bot"
          git config user.email "alphashark@noreply"
          git add portfolio_history.json DAILY_LOG.md paper_account.json PREGAME_LEARNING.md || true
          git diff --staged --quiet || git commit -m "chore: daily portfolio update $(date +%Y-%m-%d)"
          git push
