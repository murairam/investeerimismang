# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: AlphaShark Daily Run

on:
  schedule:
    # 04:00 UTC = 07:00 EEST (UTC+3, summer / game period)
    # Runs Mon–Fri, ~180 min before the 10:00 EEST submission cutoff
    # Buffer needed: GitHub queue delay typically 30-60 min + pipeline ~20 min = ~80 min total
    # Extra hour vs prior 05:00 UTC schedule gives margin on slow GitHub queue days.
    - cron: '0 4 * * 1-5'
  workflow_dispatch:   # allow manual trigger for testing

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: alphashark-daily
      cancel-in-progress: true
    permissions:
      contents: write   # needed to commit portfolio_history.json + DAILY_LOG.md back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AlphaShark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: python main.py

      - name: Alert on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"embeds":[{"title":"🚨 AlphaShark FAILED","description":"Morning run failed — portfolio was NOT updated.\n\n**Action required:** Submit portfolio manually on the game website before **10:00 EET**.","color":15158332}]}'

      - name: Commit portfolio history and daily log
        run: |
          git config user.name "AlphaShark Bot"
          git config user.email "alphashark@noreply"
          git add portfolio_history.json DAILY_LOG.md PREGAME_LOG.md PREGAME_RUNS.md paper_account.json PREGAME_LEARNING.md AI_SELF_CRITIQUE.md cost_log.json verification_tracker.json live_mode_lock.json LIVE_HANDOFF*.md learning_state.json evening_observations.json || true
          TODAY=$(date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "chore: daily portfolio update $TODAY"
          git status --short && git restore . 2>/dev/null || true
          git pull --rebase origin main
          git push
