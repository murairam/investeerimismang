# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Refresh live-mode lock

# Fires on every push to main that touches a protected strategy file.
# Recomputes SHA256 fingerprints and commits the updated live_mode_lock.json
# so the daily AlphaShark run never hits a "parameter freeze violation" error.
on:
  push:
    branches: [main]
    paths:
      - config.py
      - docs/rules.txt
      - agents/strategist.py
      - agents/full_analyst.py
      - agents/devil.py
      - agents/risk_manager.py
      - agents/challenger.py

jobs:
  refresh-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate live_mode_lock.json
        run: |
          python - <<'EOF'
          import hashlib, json, os
          from datetime import date

          ROOT = os.getcwd()
          PROTECTED = [
              "config.py",
              "docs/rules.txt",
              "agents/strategist.py",
              "agents/full_analyst.py",
              "agents/devil.py",
              "agents/risk_manager.py",
              "agents/challenger.py",
          ]
          LOCK_PATH = os.path.join(ROOT, "live_mode_lock.json")

          def sha256(path: str) -> str:
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(8192), b""):
                      h.update(chunk)
              return h.hexdigest()

          fingerprints = {p: sha256(os.path.join(ROOT, p)) for p in PROTECTED}

          # Preserve game_start_date from existing lock if present.
          game_start_date = "2026-04-06"
          if os.path.exists(LOCK_PATH):
              with open(LOCK_PATH) as f:
                  existing = json.load(f)
              game_start_date = existing.get("game_start_date", game_start_date)

          payload = {
              "created_on": date.today().isoformat(),
              "game_start_date": game_start_date,
              "protected_files": PROTECTED,
              "fingerprints": fingerprints,
          }
          with open(LOCK_PATH, "w") as f:
              json.dump(payload, f, indent=2)

          print("live_mode_lock.json updated:")
          for k, v in fingerprints.items():
              print(f"  {k}: {v}")
          EOF

      - name: Commit updated lock
        run: |
          git config user.name "AlphaShark Bot"
          git config user.email "alphashark@noreply"
          git add live_mode_lock.json
          git diff --staged --quiet || git commit -m "chore: refresh live_mode_lock.json after protected-file change"
          git pull --rebase origin main
          git push
